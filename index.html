<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>현장지도</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:-apple-system,sans-serif;background:#000}
#map{position:absolute;inset:0}
#layer-toggle{
  position:fixed;top:12px;left:50%;transform:translateX(-50%);
  display:flex;gap:4px;z-index:1000;
  background:rgba(0,0,0,.65);border-radius:20px;padding:4px;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
#layer-toggle button{
  padding:6px 14px;border:none;border-radius:16px;
  font-size:13px;font-weight:500;cursor:pointer;
  color:#ccc;background:transparent;transition:all .15s;
}
#layer-toggle button.active{background:white;color:#000;font-weight:700}
#gps-btn,#list-btn{
  position:fixed;bottom:32px;z-index:1000;
  width:50px;height:50px;border-radius:50%;border:none;
  background:white;font-size:22px;
  box-shadow:0 2px 10px rgba(0,0,0,.35);cursor:pointer;
}
#gps-btn{right:16px}
#list-btn{left:16px}
#gps-btn.tracking{background:#3b82f6}
@keyframes gps-pulse{
  0%{transform:scale(1);opacity:1}
  70%{transform:scale(2.8);opacity:0}
  100%{transform:scale(1);opacity:0}
}
.gps-dot{
  position:relative;width:16px;height:16px;
}
.gps-dot-inner{
  width:16px;height:16px;background:#ef4444;border-radius:50%;
  border:2.5px solid #fff;box-shadow:0 0 4px rgba(0,0,0,.4);
  position:relative;z-index:1;
}
.gps-dot-ring{
  position:absolute;top:0;left:0;
  width:16px;height:16px;border-radius:50%;
  background:#ef4444;opacity:.6;
  animation:gps-pulse 1.6s ease-out infinite;
}
#toast{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.75);color:white;padding:8px 18px;
  border-radius:20px;font-size:13px;z-index:2000;
  opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:1}
#list-panel{
  position:fixed;bottom:0;left:0;right:0;z-index:1500;
  background:#1e1e1e;border-radius:16px 16px 0 0;
  max-height:60vh;overflow-y:auto;padding:0 0 32px;
  transform:translateY(100%);transition:transform .3s;
}
#list-panel.open{transform:translateY(0)}
#list-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 16px;border-bottom:1px solid #333;
}
#list-header h3{font-size:15px;color:#fff}
#list-close{background:none;border:none;color:#888;font-size:20px;cursor:pointer}
.list-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 16px;border-bottom:1px solid #272727;cursor:pointer;
}
.list-item:active{background:#2a2a2a}
.list-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.list-name{color:#fff;font-size:14px}
.list-addr{color:#888;font-size:12px;margin-top:1px}
/* Leaflet 팝업 → 데스크탑 dark 스타일 */
.leaflet-popup-content-wrapper{
  background:rgba(0,0,0,.72)!important;border-radius:8px!important;
  padding:0!important;box-shadow:0 4px 16px rgba(0,0,0,.4)!important;border:none!important;
}
.leaflet-popup-content{margin:6px 10px!important;color:#fde047!important;font-size:12px!important;line-height:1.5!important;}
.leaflet-popup-tip{background:rgba(0,0,0,.72)!important;}
.leaflet-popup-close-button{color:rgba(255,255,255,.5)!important;top:3px!important;right:5px!important;}
.pau-name{font-weight:700;color:#fde047;}
.pau-memo{font-size:11px;color:#fde047;white-space:pre-line;}
</style>
</head>

const MT = [
  {id:1,label:'본건',    color:'#ef4444'},
  {id:2,label:'표준지',  color:'#3b82f6'},
  {id:3,label:'거래사례',color:'#22c55e'},
  {id:4,label:'평가선례',color:'#f59e0b'},
  {id:5,label:'기타',    color:'#8b5cf6'},
];
function ti(id){ return MT.find(t=>t.id===Number(id))||MT[4]; }

// 지도
const lats=FAVS.map(f=>f.lat), lngs=FAVS.map(f=>f.lng);
const cLat=(Math.min(...lats)+Math.max(...lats))/2;
const cLng=(Math.min(...lngs)+Math.max(...lngs))/2;
const map=L.map('map',{zoomControl:false}).setView([cLat,cLng],17);
L.control.zoom({position:'bottomright'}).addTo(map);

const tOSM=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OSM'});
const tAerial=L.tileLayer(
  `https://api.vworld.kr/req/wmts/1.0.0/${VWORLD_KEY}/Satellite/{z}/{y}/{x}.jpeg`,
  {maxZoom:19,attribution:'© VWorld'}
);
tAerial.addTo(map);
let base='aerial';

document.getElementById('btn-normal').onclick=()=>{
  if(base==='normal')return;
  map.removeLayer(tAerial);tOSM.addTo(map);base='normal';
  document.getElementById('btn-normal').classList.add('active');
  document.getElementById('btn-aerial').classList.remove('active');
};
document.getElementById('btn-aerial').onclick=()=>{
  if(base==='aerial')return;
  map.removeLayer(tOSM);tAerial.addTo(map);base='aerial';
  document.getElementById('btn-aerial').classList.add('active');
  document.getElementById('btn-normal').classList.remove('active');
};

// 표준지 지적선 (노란색)
if(CADASTRAL.features&&CADASTRAL.features.length){
  L.geoJSON(CADASTRAL,{style:{color:'#facc15',weight:1.5,opacity:.85,fill:false}}).addTo(map);
}

// 마커
const tc={}, listEl=document.getElementById('list-items');
FAVS.forEach(fav=>{
  const t=ti(fav.type);
  tc[fav.type]=(tc[fav.type]||0)+1;
  const seq=tc[fav.type];
  const label=fav.name||t.label;
  const icon=L.divIcon({
    className:'',
    html:`<div style="display:flex;flex-direction:column;align-items:center;gap:1px;width:72px">
      <div style="width:8px;height:8px;border-radius:50%;background:${t.color};border:1.5px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.5)"></div>
      <div style="background:rgba(0,0,0,.6);color:#fff;border-radius:3px;padding:1px 4px;font-size:9px;font-weight:600;white-space:nowrap;line-height:1.3;max-width:72px;overflow:hidden;text-overflow:ellipsis;text-align:center">${label}</div>
    </div>`,
    iconSize:[72,24],iconAnchor:[36,4],
  });
  const m=L.marker([fav.lat,fav.lng],{icon}).addTo(map);
  const lastDong=s=>s?s.trim().split(/s+/).pop():'';
  const fmtNum=v=>{const n=Number(String(v).replace(/,/g,''));return v!==''&&!isNaN(n)?n.toLocaleString():v;};
  const popName=[lastDong(fav.dong),fav.jibun].filter(Boolean).join(' ')||fav.name||t.label;
  const popLine1=[fav.jimok,fav.jiyuk].filter(Boolean).join('/');
  const popLine2=fmtNum((fav.memo||'').split(' / ')[0]);
  const memoText=[popLine1,popLine2].filter(Boolean).join('
');
  m.bindPopup(`<div><div class="pau-name">${popName}</div>${memoText?'<div class="pau-memo">'+memoText+'</div>':''}</div>`,{closeButton:false});

  const addr=(fav.dong?fav.dong+' ':'')+(fav.jibun||'');
  const div=document.createElement('div');
  div.className='list-item';
  div.innerHTML=`<div class="list-dot" style="background:${t.color}"></div>
    <div><div class="list-name">${label}</div>
    <div class="list-addr">${addr.trim()}</div></div>`;
  div.onclick=()=>{ map.setView([fav.lat,fav.lng],18); m.openPopup(); closeList(); };
  listEl.appendChild(div);
});

if(FAVS.length>1){
  map.fitBounds(L.latLngBounds(FAVS.map(f=>[f.lat,f.lng])),{padding:[50,50]});
}

// 목록 패널
const listPanel=document.getElementById('list-panel');
document.getElementById('list-btn').onclick=()=>listPanel.classList.toggle('open');
document.getElementById('list-close').onclick=closeList;
function closeList(){ listPanel.classList.remove('open'); }

// GPS
let gpsM=null,gpsC=null,wid=null,tracking=false;
const gpsIcon=L.divIcon({
  className:'',
  html:'<div class="gps-dot"><div class="gps-dot-ring"></div><div class="gps-dot-inner"></div></div>',
  iconSize:[16,16],iconAnchor:[8,8],
});

document.getElementById('gps-btn').onclick=()=>{
  if(!navigator.geolocation){ toast('GPS 미지원'); return; }
  if(tracking){
    navigator.geolocation.clearWatch(wid);
    tracking=false;
    document.getElementById('gps-btn').classList.remove('tracking');
    document.getElementById('gps-btn').textContent='📍';
    toast('위치 추적 종료');
  } else {
    wid=navigator.geolocation.watchPosition(pos=>{
      const{latitude:lat,longitude:lng,accuracy:acc}=pos.coords;
      if(!gpsM){
        gpsM=L.marker([lat,lng],{icon:gpsIcon,zIndexOffset:1000}).addTo(map);
        gpsC=L.circle([lat,lng],{radius:acc,color:'#ef4444',fillOpacity:.08,weight:1}).addTo(map);
        map.setView([lat,lng],map.getZoom());
      } else {
        gpsM.setLatLng([lat,lng]);
        gpsC.setLatLng([lat,lng]).setRadius(acc);
      }
    },err=>{
      tracking=false;
      document.getElementById('gps-btn').classList.remove('tracking');
      document.getElementById('gps-btn').textContent='📍';
      if(err.code===1) toast('위치 권한 거부됨 → 설정>Safari>위치 확인');
      else if(err.code===2) toast('위치를 가져올 수 없습니다 (신호 없음)');
      else toast('GPS 오류: '+err.message);
    },{enableHighAccuracy:true,maximumAge:5000,timeout:15000});
    tracking=true;
    document.getElementById('gps-btn').classList.add('tracking');
    document.getElementById('gps-btn').textContent='🔵';
    toast('위치 추적 시작');
  }
};

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}
</script>
