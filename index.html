<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:-apple-system,sans-serif;background:#000}
#map{position:absolute;inset:0}
#layer-toggle{position:fixed;top:12px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:1000;background:rgba(0,0,0,.65);border-radius:20px;padding:4px;}
#layer-toggle button{padding:6px 14px;border:none;border-radius:16px;font-size:13px;font-weight:500;cursor:pointer;color:#ccc;background:transparent;}
#layer-toggle button.active{background:white;color:#000;font-weight:700}
#gps-btn{position:fixed;bottom:32px;right:16px;z-index:1000;width:50px;height:50px;border-radius:50%;border:none;background:white;font-size:22px;box-shadow:0 2px 10px rgba(0,0,0,.35);cursor:pointer;}
#list-btn{position:fixed;bottom:32px;left:16px;z-index:1000;width:50px;height:50px;border-radius:50%;border:none;background:white;font-size:22px;box-shadow:0 2px 10px rgba(0,0,0,.35);cursor:pointer;}
@keyframes gps-pulse{0%{transform:scale(1);opacity:1}70%{transform:scale(2.8);opacity:0}100%{transform:scale(1);opacity:0}}
.gps-dot{position:relative;width:16px;height:16px;}
.gps-dot-inner{width:16px;height:16px;background:#ef4444;border-radius:50%;border:2.5px solid #fff;position:relative;z-index:1;}
.gps-dot-ring{position:absolute;top:0;left:0;width:16px;height:16px;border-radius:50%;background:#ef4444;opacity:.6;animation:gps-pulse 1.6s ease-out infinite;}
#toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:white;padding:8px 18px;border-radius:20px;font-size:13px;z-index:2000;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1}
#list-panel{position:fixed;bottom:0;left:0;right:0;z-index:1500;background:#1e1e1e;border-radius:16px 16px 0 0;max-height:60vh;overflow-y:auto;padding:0 0 32px;transform:translateY(100%);transition:transform .3s;}
#list-panel.open{transform:translateY(0)}
#list-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid #333;}
#list-header h3{font-size:15px;color:#fff}
#list-close{background:none;border:none;color:#888;font-size:20px;cursor:pointer}
.list-item{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid #272727;cursor:pointer;}
.list-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.list-name{color:#fff;font-size:14px}
.list-addr{color:#888;font-size:12px;margin-top:1px}
</style>
</head>

<script>
var VWORLD_KEY="BF236E29-368D-344A-AF28-8DB019EAE50A";
var FAVS=JSON.parse(document.getElementById("d-favs").textContent);
var CADASTRAL=JSON.parse(document.getElementById("d-cad").textContent);
var MAIN_CADASTRAL=JSON.parse(document.getElementById("d-main").textContent);
var MT=[{id:1,label:"본건",color:"#ef4444"},{id:2,label:"표준지",color:"#3b82f6"},{id:3,label:"거래사례",color:"#22c55e"},{id:4,label:"평가선례",color:"#f59e0b"},{id:5,label:"기타",color:"#8b5cf6"}];
function ti(id){return MT.find(function(t){return t.id===Number(id);})||MT[4];}
function escHtml(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
var lats=FAVS.map(function(f){return f.lat;}),lngs=FAVS.map(function(f){return f.lng;});
var cLat=(Math.min.apply(null,lats)+Math.max.apply(null,lats))/2;
var cLng=(Math.min.apply(null,lngs)+Math.max.apply(null,lngs))/2;
var map=L.map("map",{zoomControl:false}).setView([cLat,cLng],17);
L.control.zoom({position:"bottomright"}).addTo(map);
var tOSM=L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19});
var tAerial=L.tileLayer("https://api.vworld.kr/req/wmts/1.0.0/"+VWORLD_KEY+"/Satellite/{z}/{y}/{x}.jpeg",{maxZoom:19});
tAerial.addTo(map);
var base="aerial";
document.getElementById("btn-normal").onclick=function(){if(base==="normal")return;map.removeLayer(tAerial);tOSM.addTo(map);base="normal";document.getElementById("btn-normal").classList.add("active");document.getElementById("btn-aerial").classList.remove("active");};
document.getElementById("btn-aerial").onclick=function(){if(base==="aerial")return;map.removeLayer(tOSM);tAerial.addTo(map);base="aerial";document.getElementById("btn-aerial").classList.add("active");document.getElementById("btn-normal").classList.remove("active");};
if(CADASTRAL.features&&CADASTRAL.features.length){L.geoJSON(CADASTRAL,{style:{color:"#facc15",weight:1.5,opacity:.85,fill:false}}).addTo(map);}
function _isWgs84Korea(fc){try{var c=fc.features[0].geometry.coordinates;while(Array.isArray(c[0]))c=c[0];return c[0]>100&&c[0]<145&&c[1]>30&&c[1]<50;}catch(e){return false;}}
if(MAIN_CADASTRAL.features&&MAIN_CADASTRAL.features.length&&_isWgs84Korea(MAIN_CADASTRAL)){L.geoJSON(MAIN_CADASTRAL,{style:{color:"#f472b6",weight:3,opacity:.9,fill:false}}).addTo(map);}
var listEl=document.getElementById("list-items");
FAVS.forEach(function(fav){
  var t=ti(fav.type);
  var dotHtml="<div style=\"width:21px;height:21px;border-radius:50%;background:"+t.color+";border:1.5px solid rgba(255,255,255,.8);box-shadow:0 1px 3px rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;overflow:hidden\">"+escHtml(fav.name)+"</div>";
  var icon=L.divIcon({className:"",html:dotHtml,iconSize:[21,21],iconAnchor:[10,10]});
  var m=L.marker([fav.lat,fav.lng],{icon:icon}).addTo(map);
  var lastDong=function(s){return s?s.trim().split(/\s+/).pop():""};
  var popName=[lastDong(fav.dong),fav.jibun].filter(Boolean).join(" ")||fav.name||t.label;
  var line1=[fav.jimok,fav.jiyuk].filter(Boolean).join("/");
  var line2=(fav.memo||"").split(" / ")[0];
  m.bindPopup("<b>"+escHtml(popName)+"</b>"+(line1?"<br>"+escHtml(line1):"")+(line2?"<br>"+escHtml(line2):""));
  var addr=(fav.dong?fav.dong+" ":"")+(fav.jibun||"");
  var div=document.createElement("div");
  div.className="list-item";
  div.innerHTML="<div class=\"list-dot\" style=\"background:"+t.color+"\"></div><div><div class=\"list-name\">"+escHtml(fav.name||t.label)+"</div><div class=\"list-addr\">"+escHtml(addr.trim())+"</div></div>";
  div.onclick=function(){map.setView([fav.lat,fav.lng],18);m.openPopup();listPanel.classList.remove("open");};
  listEl.appendChild(div);
});
if(FAVS.length>1){map.fitBounds(L.latLngBounds(FAVS.map(function(f){return[f.lat,f.lng];})),{padding:[50,50]});}
var listPanel=document.getElementById("list-panel");
document.getElementById("list-btn").onclick=function(){listPanel.classList.toggle("open");};
document.getElementById("list-close").onclick=function(){listPanel.classList.remove("open");};
var gpsM=null,gpsC=null,wid=null,tracking=false;
var gpsIcon=L.divIcon({className:"",html:"<div class=\"gps-dot\"><div class=\"gps-dot-ring\"></div><div class=\"gps-dot-inner\"></div></div>",iconSize:[16,16],iconAnchor:[8,8]});
document.getElementById("gps-btn").onclick=function(){
  if(!navigator.geolocation){alert("GPS 미지원");return;}
  if(tracking){
    navigator.geolocation.clearWatch(wid);tracking=false;
    document.getElementById("gps-btn").textContent="📍";
  }else{
    wid=navigator.geolocation.watchPosition(function(pos){
      var lat=pos.coords.latitude,lng=pos.coords.longitude,acc=pos.coords.accuracy;
      if(!gpsM){gpsM=L.marker([lat,lng],{icon:gpsIcon,zIndexOffset:1000}).addTo(map);gpsC=L.circle([lat,lng],{radius:acc,color:"#ef4444",fillOpacity:.08,weight:1}).addTo(map);map.setView([lat,lng],map.getZoom());}
      else{gpsM.setLatLng([lat,lng]);gpsC.setLatLng([lat,lng]).setRadius(acc);}
    },function(err){
      if(err.code===1)alert("위치 권한 거부 → 설정>Safari>위치 확인");
      else alert("GPS 오류: "+err.message);
      tracking=false;document.getElementById("gps-btn").textContent="📍";
    },{enableHighAccuracy:true,maximumAge:5000,timeout:15000});
    tracking=true;document.getElementById("gps-btn").textContent="🔵";
  }
};
</script>
